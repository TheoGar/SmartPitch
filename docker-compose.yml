networks:
  smartpitch-net:
    driver: bridge

volumes:
  mosquitto-data:
  smartpitch-db:

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    networks:
      - smartpitch-net
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "ping", "-q", "1"]
      interval: 5s
      timeout: 5s
      retries: 10

  processing:
    build:
      context: .
      dockerfile: processing/Dockerfile
    container_name: processing
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    networks:
      - smartpitch-net
    restart: unless-stopped

  analytics:
    build:
      context: .
      dockerfile: analytics/Dockerfile
    container_name: analytics
    depends_on:
      mosquitto:
        condition: service_healthy
      processing:
        condition: service_started
    volumes:
      - smartpitch-db:/app/data
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MATCH_ID=match_001
    networks:
      - smartpitch-net
    restart: unless-stopped

  simulation:
    build:
      context: .
      dockerfile: simulation/Dockerfile
    container_name: simulation
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - PLAYERS=10
      - MATCH_DURATION=90
      - MATCH_ID=match_001
    networks:
      - smartpitch-net
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    depends_on:
      mosquitto:
        condition: service_healthy
      processing:
        condition: service_started
    ports:
      - "8080:8080"
      - "8765:8765"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MATCH_ID=match_001
    networks:
      - smartpitch-net
    restart: unless-stopped
